name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  windows-x64:
    name: Windows x64
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item build/Release/dst_mem_patch.dll dist/
          Copy-Item build/Release/dst_patch_injector.exe dist/
          Compress-Archive -Path dist/* -DestinationPath dst-mem-patch-windows-x64.zip -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dst-mem-patch-windows-x64
          path: dst-mem-patch-windows-x64.zip
          if-no-files-found: error
